name: Deploy site (Quartz + Toolbox)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-plugins-

      - name: Install dependencies
        run: npm ci

      # Use node directly: npx quartz fails on Linux (exit 127) because the
      # bootstrap-cli.mjs shebang (env -S) is not executed via npm bin link.
      - name: Install Quartz plugins
        run: node ./quartz/bootstrap-cli.mjs plugin install --from-config

      - name: Build Quartz notes
        run: node ./quartz/bootstrap-cli.mjs build

      - name: Merge toolbox static files
        run: bash scripts/merge-static.sh

      - name: Verify output
        run: |
          echo "Output directory contents:"
          ls -la public/
          test -f public/reports.json
          grep -q brief_reports public/reports.json
          grep -q 口播创作台 public/index.html
          grep -q 日报归档 public/index.html
          test ! -d public/site/local

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
