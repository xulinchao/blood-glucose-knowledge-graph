<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GI 食物数据库 · 145种食物升糖数据</title>
<style>
:root {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #232735;
  --ink: #e8eaed; --muted: #8b8fa3;
  --accent: #00d4aa; --accent2: #ff6b6b; --accent3: #ffd93d; --accent4: #6c8cff;
  --rule: #2a2d3a; --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, 'Segoe UI', 'Noto Sans CJK SC', sans-serif;
  background: var(--bg); color: var(--ink); line-height: 1.6; min-height: 100vh;
}
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

/* Header */
.header { text-align: center; padding: 20px 0 16px; border-bottom: 1px solid var(--rule); margin-bottom: 20px; }
.header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.header p { color: var(--muted); font-size: 13px; }
.header .back { display: inline-block; margin-bottom: 12px; color: var(--accent); font-size: 13px; text-decoration: none; }
.header .back:hover { text-decoration: underline; }

/* Stats */
.stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
.stat { background: var(--bg2); border: 1px solid var(--rule); border-radius: var(--radius); padding: 10px 16px; text-align: center; min-width: 100px; }
.stat .num { font-size: 20px; font-weight: 700; color: var(--accent); }
.stat .label { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Filters */
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.filters input, .filters select {
  background: var(--bg3); border: 1px solid var(--rule); border-radius: var(--radius);
  color: var(--ink); padding: 8px 12px; font-size: 13px; flex: 1; min-width: 180px;
}
.filters input:focus, .filters select:focus { outline: none; border-color: var(--accent); }

/* Legend */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; }
.legend span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-low { background: var(--accent); }
.dot-mid { background: var(--accent3); }
.dot-high { background: var(--accent2); }

/* Table */
.table-wrap { overflow-x: auto; border: 1px solid var(--rule); border-radius: var(--radius); }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { background: var(--bg3); color: var(--accent); font-weight: 600; padding: 10px 8px; text-align: left; border-bottom: 2px solid var(--rule); white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { color: var(--ink); }
td { padding: 8px; border-bottom: 1px solid var(--rule); color: var(--ink); }
tr:hover td { background: rgba(0,212,170,0.03); }
.gi-low { color: var(--accent); font-weight: 600; }
.gi-mid { color: var(--accent3); font-weight: 600; }
.gi-high { color: var(--accent2); font-weight: 600; }
.category-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: rgba(0,0,0,0.2); color: var(--muted); white-space: nowrap; }

/* Loading */
.loading { text-align: center; padding: 60px; color: var(--muted); }

/* Footer */
.footer { text-align: center; padding: 20px 0; margin-top: 20px; border-top: 1px solid var(--rule); color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <a href="../../index.html" class="back">← 返回首页</a>
    <h1>GI 食物数据库</h1>
    <p>145 种常见食物升糖指数 / 血糖负荷 / 营养成分 · 数据来源：悉尼大学GI库 / 中国食物成分表 / USDA</p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <input type="text" id="search" placeholder="搜索食物名称..." oninput="render()">
    <select id="catFilter" onchange="render()">
      <option value="">全部分类</option>
    </select>
    <select id="giFilter" onchange="render()">
      <option value="">全部GI</option>
      <option value="low">低GI (≤55)</option>
      <option value="mid">中GI (56-70)</option>
      <option value="high">高GI (>70)</option>
    </select>
  </div>

  <div class="legend">
    <span><span class="dot dot-low"></span> 低GI ≤55</span>
    <span><span class="dot dot-mid"></span> 中GI 56-70</span>
    <span><span class="dot dot-high"></span> 高GI >70</span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sort('name_zh')">食物名称 ↕</th>
          <th onclick="sort('category')">分类 ↕</th>
          <th onclick="sort('gi')">GI值 ↕</th>
          <th onclick="sort('gl_per_serving')">GL值 ↕</th>
          <th onclick="sort('calories_per_100g')">热量(kcal/100g) ↕</th>
          <th onclick="sort('carbs_per_100g')">碳水(g/100g) ↕</th>
          <th>建议</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="7" class="loading">加载中...</td></tr></tbody>
    </table>
  </div>

  <div class="footer">
    数据仅供参考，实际GI值受烹饪方式、成熟度、个体差异影响。不构成医疗建议。
  </div>

</div>

<script>
let DATA = [], SORT = { key: 'gi', asc: true };

fetch('./gi-database.json')
  .then(r => r.json())
  .then(json => {
    DATA = json.foods || [];
    initFilters();
    renderStats();
    render();
  })
  .catch(e => {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7" class="loading">数据加载失败，请检查 gi-database.json 是否存在</td></tr>';
  });

function initFilters() {
  const cats = [...new Set(DATA.map(f => f.category))].sort();
  const sel = document.getElementById('catFilter');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
}

function renderStats() {
  const low = DATA.filter(f => f.gi <= 55).length;
  const mid = DATA.filter(f => f.gi > 55 && f.gi <= 70).length;
  const high = DATA.filter(f => f.gi > 70).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="num">${DATA.length}</div><div class="label">总食物数</div></div>
    <div class="stat"><div class="num" style="color:var(--accent)">${low}</div><div class="label">低GI</div></div>
    <div class="stat"><div class="num" style="color:var(--accent3)">${mid}</div><div class="label">中GI</div></div>
    <div class="stat"><div class="num" style="color:var(--accent2)">${high}</div><div class="label">高GI</div></div>
  `;
}

function sort(key) {
  if (SORT.key === key) SORT.asc = !SORT.asc;
  else { SORT.key = key; SORT.asc = true; }
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const gi = document.getElementById('giFilter').value;

  let filtered = DATA.filter(f => {
    if (search && !f.name_zh.includes(search) && !f.name_en.toLowerCase().includes(search)) return false;
    if (cat && f.category !== cat) return false;
    if (gi === 'low' && f.gi > 55) return false;
    if (gi === 'mid' && (f.gi <= 55 || f.gi > 70)) return false;
    if (gi === 'high' && f.gi <= 70) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let av = a[SORT.key], bv = b[SORT.key];
    if (typeof av === 'string') av = av.toLowerCase(), bv = bv.toLowerCase();
    if (av < bv) return SORT.asc ? -1 : 1;
    if (av > bv) return SORT.asc ? 1 : -1;
    return 0;
  });

  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="loading">无匹配结果</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(f => {
    const giClass = f.gi <= 55 ? 'gi-low' : f.gi <= 70 ? 'gi-mid' : 'gi-high';
    return `<tr>
      <td><strong>${f.name_zh}</strong><br><span style="color:var(--muted);font-size:11px">${f.name_en}</span></td>
      <td><span class="category-tag">${f.category}</span></td>
      <td class="${giClass}">${f.gi}</td>
      <td>${f.gl_per_serving}</td>
      <td>${f.calories_per_100g}</td>
      <td>${f.carbs_per_100g}</td>
      <td style="font-size:11px;color:var(--muted);max-width:150px">${f.suitable_for || ''}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
